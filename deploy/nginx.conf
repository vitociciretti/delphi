# Delphi — nginx site config (WS-4).
# Serves the built SPA and reverse-proxies the API to gunicorn (127.0.0.1:8000).
# Put this at /etc/nginx/sites-available/delphi and symlink into sites-enabled,
# then run certbot (see docs/deployment.md) to fill in the TLS block.
#
# Replace delphi.example.com and /var/www/delphi/dist with your values.

server {
    listen 80;
    server_name delphi.example.com;

    # certbot serves the ACME challenge, then 301s everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name delphi.example.com;

    # Filled in by certbot --nginx:
    # ssl_certificate     /etc/letsencrypt/live/delphi.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/delphi.example.com/privkey.pem;

    # Uploads can be up to 50MB (Config.MAX_CONTENT_LENGTH).
    client_max_body_size 50m;

    # ---- Static SPA ----
    root /var/www/delphi/dist;
    index index.html;

    # Hashed assets are immutable; cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- API + health -> gunicorn ----
    # (No CORS needed: same origin. The workspace cookie is first-party.)
    location ~ ^/(api|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Report agent log stream + long LLM calls: don't buffer, allow time.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ---- SPA fallback (client-side routing) ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
